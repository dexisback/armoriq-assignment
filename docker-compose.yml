services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: armoriq-agent
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: armoriq-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      # Override with Docker service name for inter-container networking
      NEXT_PUBLIC_API_URL: http://agent:4000
      AGENT_URL: http://agent:4000
    ports:
      - "3000:3000"
    depends_on:
      - agent
